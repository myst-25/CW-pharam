plugins {
    id 'com.android.application'
}

android {
    namespace 'com.cwpdf.saver'
    compileSdk 36

    defaultConfig {
        applicationId "com.cwpdf.saver"
        minSdk 24
        targetSdk 36
        versionCode 4
        versionName "1.2.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (variant.name == "release") {
                outputFileName = "cw-pharma-v${variant.versionName}-myst25.apk"
            }
        }
    }
}

dependencies {
    // LSPosed / Xposed API — compileOnly so it's NOT bundled in the APK
    compileOnly 'io.github.libxposed:api:102.0.0'

    // OkHttp for downloading the PDF inside the hook
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    
    // UI dependencies for Material Design 3
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
